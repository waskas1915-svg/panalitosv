<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panalitosv</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: white;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header img {
      height: 60px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .hero {
      background: url('./images/hero.jpg') center/cover no-repeat;
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <img src="./images/logo.png" alt="Logo">
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Catálogo</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <h1>Bienvenido a Panalitosv</h1>
  <p>Saborea el momento, deja que la dulzura transforme tus días.</p>
</section>

<section class="section">
  <h2>Nuestros Productos</h2>

  <div class="products">
    <div class="product">
      <img src="./images/product1.jpg" alt="">
      <h3>Miel Natural</h3>
      <p>Pura, orgánica y deliciosa.</p>
    </div>

    <div class="product">
      <img src="./images/product2.jpg" alt="">
      <h3>Miel Premium</h3>
      <p>Calidad superior para tu salud.</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Panalitosv - Todos los derechos reservados</p>
</footer>

</body>
</html>
